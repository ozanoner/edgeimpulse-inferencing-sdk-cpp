version: "0.1.1"
description: Edge Impulse inferencing SDK packaged as an ESP-IDF component
  for ESP32-S3.
license: BSD-3-Clause-Clear
url: https://github.com/ozanoner/edgeimpulse-inferencing-sdk-cpp
repository: https://github.com/ozanoner/edgeimpulse-inferencing-sdk-cpp.git
documentation: 
  https://github.com/ozanoner/edgeimpulse-inferencing-sdk-cpp#readme
issues: https://github.com/ozanoner/edgeimpulse-inferencing-sdk-cpp/issues
maintainers:
  - Ozan Oner <ozan.oner@gmail.com>
targets:
  - esp32s3
tags:
  - edge-impulse
  - inference
  - machine-learning
  - tinyml
  - tflm
  - tflite-micro

files:
  use_gitignore: true
  exclude:
    - "**/Makefile"
    - ".github/**/*"
    - "docs/**/*"
    - "test/**/*"
    - "test_app/**/*"
    - "tmp/**/*"
    - "**/tmp/**/*"
    - ".git/**/*"

dependencies:
  # Required IDF version
  idf: '>=5.5,<6.0'
  espressif/esp-dsp: ^1.8.0
  espressif/esp-nn: ^1.2.1
